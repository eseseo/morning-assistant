<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f4f7e8" />
  <title>슈퍼대장님 🤘</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f7e8; }
    input, select, textarea, button { font-family: 'Courier New', Courier, monospace; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: none; opacity: 0.5; }
    select option { background: #ffffff; color: #1f1f2e; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f4f7e8; }
    ::-webkit-scrollbar-thumb { background: #a7c957; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const STORAGE_KEY  = "jy_tasks_v1";
    const GH_TOKEN_KEY = "jy_gh_token";
    const GH_REPO_KEY  = "jy_gh_repo";

    async function syncToGitHub(tasks, token, repo) {
      const path    = "tasks.json";
      const apiBase = `https://api.github.com/repos/${repo}/contents/${path}`;
      const headers = { Authorization: `token ${token}`, "Content-Type": "application/json" };
      const content = btoa(unescape(encodeURIComponent(
        JSON.stringify({ tasks, syncedAt: new Date().toISOString() }, null, 2)
      )));
      let sha;
      try {
        const r = await fetch(apiBase, { headers });
        if (r.ok) sha = (await r.json()).sha;
      } catch {}
      const res = await fetch(apiBase, {
        method: "PUT", headers,
        body: JSON.stringify({
          message: `tasks sync ${new Date().toISOString().slice(0,16)}`,
          content, ...(sha ? { sha } : {}),
        }),
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return true;
    }

    const todayStr = () => new Date().toISOString().split("T")[0];
    const fmtDate  = (s) => {
      if (!s) return "";
      return new Date(s + "T12:00:00").toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" });
    };
    const fmtFull  = () => new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    const fmtTime  = () => new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    const uid      = () => Math.random().toString(36).slice(2, 10);
    const blankForm = () => ({ title: "", date: todayStr(), time: "", priority: "medium", category: "업무", notes: "" });

    const PRIORITY = {
      high:   { label: "긴급", color: "#ef4444", glow: "rgba(239,68,68,.15)" },
      medium: { label: "보통", color: "#f59e0b", glow: "rgba(245,158,11,.15)" },
      low:    { label: "여유", color: "#10b981",  glow: "rgba(16,185,129,.15)"  },
    };
    const CATS = ["업무", "개인", "미팅", "공부", "기타"];

    function App() {
      const [tasks, setTasks] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
      });
      const [now,        setNow]        = useState(fmtTime());
      const [view,       setView]       = useState("today");
      const [showForm,   setShowForm]   = useState(false);
      const [editId,     setEditId]     = useState(null);
      const [form,       setForm]       = useState(blankForm());
      const [ghToken,    setGhToken]    = useState(() => localStorage.getItem(GH_TOKEN_KEY) || "");
      const [ghRepo,     setGhRepo]     = useState(() => localStorage.getItem(GH_REPO_KEY)  || "");
      const [ghStatus,   setGhStatus]   = useState("idle");
      const [showGhForm, setShowGhForm] = useState(false);

      useEffect(() => {
        const t = setInterval(() => setNow(fmtTime()), 30000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }, [tasks]);

      // 할 일 변경 시 자동 GitHub 동기화 (토큰/레포 설정된 경우)
      const autoSyncTimer = React.useRef(null);
      const isFirstRender = React.useRef(true);
      useEffect(() => {
        if (isFirstRender.current) { isFirstRender.current = false; return; }
        if (!ghToken || !ghRepo) return;
        if (autoSyncTimer.current) clearTimeout(autoSyncTimer.current);
        autoSyncTimer.current = setTimeout(async () => {
          setGhStatus("syncing");
          try {
            await syncToGitHub(tasks, ghToken, ghRepo);
            setGhStatus("ok");
            setTimeout(() => setGhStatus("idle"), 2000);
          } catch {
            setGhStatus("err");
            setTimeout(() => setGhStatus("idle"), 3000);
          }
        }, 1500);
      }, [tasks]);

      const handleGhSync = useCallback(async () => {
        if (!ghToken || !ghRepo) { setShowGhForm(true); return; }
        setGhStatus("syncing");
        try {
          await syncToGitHub(tasks, ghToken, ghRepo);
          setGhStatus("ok");
          setTimeout(() => setGhStatus("idle"), 3000);
        } catch {
          setGhStatus("err");
          setTimeout(() => setGhStatus("idle"), 4000);
        }
      }, [tasks, ghToken, ghRepo]);

      const saveGhSettings = () => {
        localStorage.setItem(GH_TOKEN_KEY, ghToken);
        localStorage.setItem(GH_REPO_KEY,  ghRepo);
        setShowGhForm(false);
      };

      const exportJSON = () => {
        const blob = new Blob([JSON.stringify({ tasks, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
        Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "tasks.json" }).click();
      };

      const saveTasks    = (fn) => setTasks((p) => fn(p));
      const handleSubmit = () => {
        if (!form.title.trim()) return;
        if (editId) saveTasks((p) => p.map((t) => t.id === editId ? { ...t, ...form } : t));
        else saveTasks((p) => [...p, { id: uid(), ...form, completed: false, createdAt: new Date().toISOString() }]);
        closeForm();
      };
      const openEdit  = (task) => { setEditId(task.id); setForm({ title: task.title, date: task.date, time: task.time||"", priority: task.priority, category: task.category||"업무", notes: task.notes||"" }); setShowForm(true); };
      const closeForm = () => { setShowForm(false); setEditId(null); setForm(blankForm()); };
      const toggle    = (id) => saveTasks((p) => p.map((t) => t.id === id ? { ...t, completed: !t.completed } : t));
      const remove    = (id) => saveTasks((p) => p.filter((t) => t.id !== id));

      const today   = todayStr();
      const todayT  = tasks.filter((t) => !t.completed && t.date === today);
      const allT    = tasks.filter((t) => !t.completed).sort((a, b) => a.date.localeCompare(b.date));
      const doneT   = tasks.filter((t) => t.completed);
      const visible = { today: todayT, all: allT, done: doneT }[view];
      const grouped = view === "all" ? [...new Set(allT.map((t) => t.date))].map((d) => ({ date: d, tasks: allT.filter((t) => t.date === d) })) : null;

      return (
        <div style={S.wrap}>
          <header style={S.header}>
            <div style={S.hTop}>
              <div>
                <div style={S.brand}>슈퍼대장님 🤘</div>
                <div style={S.dateStr}>{fmtFull()}</div>
              </div>
              <div style={S.clock}>{now}</div>
            </div>
            <div style={S.stats}>
              {[{ n: todayT.length, label: "오늘", color: "#166534" }, { n: allT.length, label: "전체", color: "#4d7c0f" }, { n: doneT.length, label: "완료", color: "#10b981" }].map(({ n, label, color }) => (
                <div key={label} style={S.stat}>
                  <span style={{ color: "#ffffff", fontSize: 26, fontWeight: 900, lineHeight: 1 }}>{n}</span>
                  <span style={{ color: "rgba(255,255,255,.7)", fontSize: 11, marginTop: 2 }}>{label}</span>
                </div>
              ))}
            </div>
          </header>

          <nav style={S.nav}>
            {[["today","📅 오늘"], ["all","📋 전체"], ["done","✅ 완료"]].map(([k, label]) => (
              <button key={k} onClick={() => setView(k)} style={{ ...S.navBtn, ...(view === k ? S.navActive : {}) }}>{label}</button>
            ))}
          </nav>

          <main style={S.main}>
            <button onClick={() => { if (showForm && !editId) closeForm(); else { closeForm(); setShowForm(true); } }} style={S.addBtn}>
              {showForm && !editId ? "✕ 취소" : "+ 할 일 추가"}
            </button>

            {showForm && (
              <div style={S.form}>
                <input autoFocus style={S.inp} placeholder="무엇을 해야 하나요?" value={form.title}
                  onChange={(e) => setForm((f) => ({ ...f, title: e.target.value }))}
                  onKeyDown={(e) => e.key === "Enter" && handleSubmit()} />
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="date" style={{ ...S.inp, flex: 1 }} value={form.date} onChange={(e) => setForm((f) => ({ ...f, date: e.target.value }))} />
                  <input type="time" style={{ ...S.inp, width: 110 }} value={form.time} onChange={(e) => setForm((f) => ({ ...f, time: e.target.value }))} />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <select style={{ ...S.inp, flex: 1 }} value={form.priority} onChange={(e) => setForm((f) => ({ ...f, priority: e.target.value }))}>
                    <option value="high">🔴 긴급</option>
                    <option value="medium">🟡 보통</option>
                    <option value="low">🔵 여유</option>
                  </select>
                  <select style={{ ...S.inp, flex: 1 }} value={form.category} onChange={(e) => setForm((f) => ({ ...f, category: e.target.value }))}>
                    {CATS.map((c) => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <textarea style={{ ...S.inp, minHeight: 64, resize: "vertical" }} placeholder="메모 (선택)" value={form.notes} onChange={(e) => setForm((f) => ({ ...f, notes: e.target.value }))} />
                <button onClick={handleSubmit} style={S.submitBtn}>{editId ? "✏️ 수정 완료" : "+ 추가하기"}</button>
              </div>
            )}

            {visible.length === 0 ? (
              <div style={S.empty}>
                {view === "today" && "오늘 할 일이 없어요 🎉"}
                {view === "all"   && "할 일이 없어요!"}
                {view === "done"  && "완료된 항목이 없어요"}
              </div>
            ) : view === "all" && grouped ? (
              grouped.map(({ date, tasks: gt }) => (
                <div key={date} style={{ marginBottom: 20 }}>
                  <div style={S.dateGroup}>{date === today ? "📅 오늘 · " : ""}{fmtDate(date)}</div>
                  {gt.map((t) => <TaskCard key={t.id} task={t} today={today} onToggle={toggle} onDelete={remove} onEdit={openEdit} />)}
                </div>
              ))
            ) : (
              visible.map((t) => <TaskCard key={t.id} task={t} today={today} onToggle={toggle} onDelete={remove} onEdit={openEdit} />)
            )}
          </main>

          {showGhForm && (
            <div style={S.modal}>
              <div style={S.modalBox}>
                <div style={{ color: "#166534", fontWeight: 900, marginBottom: 12, fontSize: 15 }}>🐙 GitHub 설정</div>
                <input style={{ ...S.inp, marginBottom: 8 }} placeholder="Personal Access Token" type="password" value={ghToken} onChange={(e) => setGhToken(e.target.value)} />
                <input style={{ ...S.inp, marginBottom: 12 }} placeholder="username/repo-name" value={ghRepo} onChange={(e) => setGhRepo(e.target.value)} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={saveGhSettings} style={{ ...S.submitBtn, flex: 1, padding: "10px" }}>저장</button>
                  <button onClick={() => setShowGhForm(false)} style={{ ...S.exportBtn, flex: 1 }}>취소</button>
                </div>
              </div>
            </div>
          )}

          <footer style={S.footer}>
            <button onClick={handleGhSync} style={{ ...S.exportBtn, color: ghStatus==="ok" ? "#10b981" : ghStatus==="err" ? "#ef4444" : "#9ca3af" }}>
              {ghStatus==="syncing" ? "⏳ 동기화 중..." : ghStatus==="ok" ? "✅ GitHub 완료!" : ghStatus==="err" ? "❌ 동기화 실패" : "🐙 GitHub 동기화"}
            </button>
            <button onClick={exportJSON} style={S.exportBtn}>📤 내보내기</button>
            <span style={{ color: "#d1d5db", fontSize: 11, marginLeft: "auto" }}>{tasks.length}개</span>
          </footer>
        </div>
      );
    }

    function TaskCard({ task, today, onToggle, onDelete, onEdit }) {
      const [open, setOpen] = useState(false);
      const p = PRIORITY[task.priority] || PRIORITY.medium;
      const overdue = !task.completed && task.date && task.date < today;
      return (
        <div style={{ ...S.card, borderLeft: `3px solid ${p.color}`, boxShadow: `-2px 0 8px ${p.glow}`, opacity: task.completed ? 0.45 : 1 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
            <button onClick={() => onToggle(task.id)} style={S.check}>
              {task.completed ? "✅" : <span style={{ fontSize: 18, color: "#d1d5db" }}>○</span>}
            </button>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ ...S.title, textDecoration: task.completed ? "line-through" : "none", color: task.completed ? "#9ca3af" : "#1f1f2e" }}>
                {task.title}
              </div>
              <div style={S.meta}>
                {overdue && <span style={{ color: "#ef4444" }}>⚠ 기한 초과 · </span>}
                {task.date && fmtDate(task.date)}
                {task.time && ` ${task.time}`}
                {task.category && <span style={{ marginLeft: 8, color: "#166534" }}>#{task.category}</span>}
                <span style={{ marginLeft: 8, color: p.color, fontSize: 10 }}>{p.label}</span>
              </div>
              {task.notes && <div style={S.notes}>{task.notes}</div>}
            </div>
            <div style={{ position: "relative", flexShrink: 0 }}>
              <button onClick={() => setOpen((v) => !v)} style={S.menuBtn}>⋮</button>
              {open && (
                <div style={S.dropdown} onClick={() => setOpen(false)}>
                  <button style={S.ddItem} onClick={() => onEdit(task)}>✏️ 수정</button>
                  <button style={{ ...S.ddItem, color: "#ff6b35" }} onClick={() => onDelete(task.id)}>🗑 삭제</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const S = {
      wrap:     { minHeight: "100vh", background: "#f4f7e8", color: "#1f1f2e", fontFamily: "'Courier New', Courier, monospace", maxWidth: 480, margin: "0 auto" },
      header:   { padding: "24px 20px 14px", background: "linear-gradient(180deg,#166534 0%,#4d7c0f 100%)", borderBottom: "none" },
      hTop:     { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 },
      brand:    { fontSize: 22, fontWeight: 900, color: "#ffffff", letterSpacing: "-0.5px", textShadow: "0 2px 8px rgba(0,0,0,.2)" },
      dateStr:  { fontSize: 12, color: "rgba(255,255,255,.7)", marginTop: 4 },
      clock:    { fontSize: 30, fontWeight: 900, color: "#ffffff", textShadow: "0 2px 8px rgba(0,0,0,.2)", fontVariantNumeric: "tabular-nums" },
      stats:    { display: "flex", gap: 10, marginBottom: 12 },
      stat:     { flex: 1, background: "rgba(255,255,255,.2)", border: "1px solid rgba(255,255,255,.25)", borderRadius: 8, padding: "10px 0", display: "flex", flexDirection: "column", alignItems: "center" },
      nav:      { display: "flex", borderBottom: "1px solid #e5e7eb", background: "#ffffff" },
      navBtn:   { flex: 1, padding: "13px 8px", background: "transparent", border: "none", color: "#9ca3af", fontSize: 13, cursor: "pointer", fontFamily: "inherit" },
      navActive:{ color: "#166534", borderBottom: "2px solid #166534", background: "rgba(22,101,52,.04)" },
      main:     { padding: "14px 16px 20px" },
      addBtn:   { width: "100%", padding: 12, marginBottom: 10, background: "transparent", border: "1.5px dashed #a7c957", borderRadius: 8, color: "#166534", fontSize: 14, cursor: "pointer", fontFamily: "inherit", letterSpacing: ".5px" },
      form:     { background: "#ffffff", border: "1px solid #e5e7eb", borderRadius: 12, padding: 14, marginBottom: 14, display: "flex", flexDirection: "column", gap: 8, boxShadow: "0 2px 12px rgba(22,101,52,.08)" },
      inp:      { background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 6, padding: "10px 12px", color: "#1f1f2e", fontSize: 14, fontFamily: "inherit", outline: "none", width: "100%", boxSizing: "border-box" },
      submitBtn:{ padding: 12, background: "#166534", border: "none", borderRadius: 8, color: "#ffffff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: ".5px" },
      dateGroup:{ fontSize: 11, color: "#9ca3af", letterSpacing: ".5px", textTransform: "uppercase", marginBottom: 6, paddingLeft: 2 },
      card:     { background: "#ffffff", borderRadius: 10, padding: "13px 13px", marginBottom: 8, boxShadow: "0 1px 6px rgba(0,0,0,.06)" },
      title:    { fontSize: 15, fontWeight: 600, lineHeight: 1.35 },
      meta:     { fontSize: 11, color: "#9ca3af", marginTop: 4 },
      notes:    { fontSize: 12, color: "#d1d5db", marginTop: 6, fontStyle: "italic" },
      check:    { background: "transparent", border: "none", cursor: "pointer", fontSize: 18, padding: 0, flexShrink: 0, lineHeight: 1 },
      menuBtn:  { background: "transparent", border: "none", color: "#d1d5db", cursor: "pointer", fontSize: 20, padding: "0 4px", lineHeight: 1 },
      dropdown: { position: "absolute", right: 0, top: "100%", background: "#ffffff", border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden", zIndex: 100, minWidth: 110, boxShadow: "0 4px 16px rgba(0,0,0,.1)" },
      ddItem:   { display: "block", width: "100%", padding: "10px 14px", background: "transparent", border: "none", color: "#374151", fontSize: 13, cursor: "pointer", textAlign: "left", fontFamily: "inherit" },
      empty:    { textAlign: "center", color: "#d1d5db", padding: "56px 20px", fontSize: 15 },
      footer:   { padding: "14px 20px", borderTop: "1px solid #e5e7eb", display: "flex", alignItems: "center", gap: 12, background: "#ffffff" },
      exportBtn:{ padding: "7px 13px", background: "transparent", border: "1px solid #e5e7eb", borderRadius: 6, color: "#9ca3af", fontSize: 12, cursor: "pointer", fontFamily: "inherit" },
      modal:    { position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999 },
      modalBox: { background: "#ffffff", border: "none", borderRadius: 14, padding: "24px 20px", width: "90%", maxWidth: 360, boxShadow: "0 8px 32px rgba(0,0,0,.15)" },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
