name: 📱 하루 3번 텔레그램 알림

on:
  schedule:
    - cron: '0 23 * * *'   # 오전 8시 KST (23:00 UTC) - 아침
    - cron: '0 4 * * *'    # 오후 1시 KST (04:00 UTC) - 점심
    - cron: '0 12 * * *'   # 오후 9시 KST (12:00 UTC) - 저녁
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 알림 전송
        env:
          BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          TASKS_FILE: tasks.json
          TZ:         Asia/Seoul
        run: python3 morning_alert.py
